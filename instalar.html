<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instalar App - Ambiente Digital Renovo</title>
    <meta name="theme-color" content="#8b0d12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css?v=20260311c" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <main class="install-page">
      <img src="icon.png" alt="Logo Renovo" class="install-logo" />
      <p class="eyebrow">Igreja Renovo</p>

      <button type="button" class="install-btn" data-install-app hidden>
        Instalar aplicativo
      </button>
    </main>

    <script src="pwa-install.js?v=20260311c"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            const registration = await navigator.serviceWorker.register("./service-worker.js?v=2026-03-11-c");
            await registration.update();

            if (registration.waiting) {
              registration.waiting.postMessage({ type: "SKIP_WAITING" });
            }

            registration.addEventListener("updatefound", () => {
              const newWorker = registration.installing;
              if (!newWorker) return;
              newWorker.addEventListener("statechange", () => {
                if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: "SKIP_WAITING" });
                }
              });
            });

            let refreshing = false;
            navigator.serviceWorker.addEventListener("controllerchange", () => {
              if (refreshing) return;
              refreshing = true;
              window.location.reload();
            });
          } catch (_) {}
        });
      }
    </script>
  </body>
</html>
